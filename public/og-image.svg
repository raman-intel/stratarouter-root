<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="routerText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- subtle grid -->
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Soft blue orb top-left -->
  <ellipse cx="100" cy="100" rx="400" ry="320" fill="rgba(37,99,235,0.06)" filter="url(#blur1)"/>
  <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>

  <!-- Soft cyan orb bottom-right -->
  <ellipse cx="1100" cy="540" rx="350" ry="280" fill="rgba(8,145,178,0.05)" filter="url(#blur2)"/>
  <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>

  <!-- Left border accent -->
  <rect x="0" y="0" width="5" height="630" fill="url(#icon)"/>

  <!-- Logo icon -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="20" fill="url(#icon)" opacity="0.15"/>
    <rect width="80" height="80" rx="20" fill="url(#icon)"/>
    <path d="M40 17L23 40h15l-2.5 23L56 40H41L40 17z" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="147" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="60" letter-spacing="-2">
    <tspan fill="#0f172a">Strata</tspan><tspan fill="url(#routerText)">Router</tspan>
  </text>

  <!-- Divider -->
  <rect x="80" y="175" width="1040" height="1.5" fill="rgba(15,23,42,0.08)"/>

  <!-- Main headline -->
  <text x="80" y="295" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="72" letter-spacing="-2.5" fill="#0f172a">Lightning-fast</text>
  <text x="80" y="380" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="72" letter-spacing="-2.5" fill="url(#headline)">semantic routing for AI.</text>

  <!-- Subheadline -->
  <text x="80" y="445" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="500" font-size="28" fill="rgba(71,85,105,0.9)">20× faster · 95.4% accuracy · 33× less memory · MIT open source</text>

  <!-- Stats chips -->
  <!-- Chip 1 -->
  <rect x="80" y="490" width="185" height="56" rx="12" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.18)" stroke-width="1"/>
  <text x="173" y="520" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#2563eb" text-anchor="middle">8.7ms</text>
  <text x="173" y="538" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" fill="rgba(71,85,105,0.8)" text-anchor="middle" font-weight="600">P99 LATENCY</text>

  <!-- Chip 2 -->
  <rect x="278" y="490" width="185" height="56" rx="12" fill="rgba(8,145,178,0.06)" stroke="rgba(8,145,178,0.18)" stroke-width="1"/>
  <text x="371" y="520" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#0891b2" text-anchor="middle">18K/s</text>
  <text x="371" y="538" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" fill="rgba(71,85,105,0.8)" text-anchor="middle" font-weight="600">THROUGHPUT</text>

  <!-- Chip 3 -->
  <rect x="476" y="490" width="185" height="56" rx="12" fill="rgba(5,150,105,0.06)" stroke="rgba(5,150,105,0.18)" stroke-width="1"/>
  <text x="569" y="520" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#059669" text-anchor="middle">95.4%</text>
  <text x="569" y="538" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" fill="rgba(71,85,105,0.8)" text-anchor="middle" font-weight="600">ACCURACY</text>

  <!-- Chip 4 -->
  <rect x="674" y="490" width="185" height="56" rx="12" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.18)" stroke-width="1"/>
  <text x="767" y="520" font-family="'Bricolage Grotesque', 'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#7c3aed" text-anchor="middle">64 MB</text>
  <text x="767" y="538" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="12" fill="rgba(71,85,105,0.8)" text-anchor="middle" font-weight="600">BASE MEMORY</text>

  <!-- stratarouter.com label bottom right -->
  <text x="1120" y="600" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="rgba(100,116,139,0.6)" text-anchor="end" font-weight="600">stratarouter.com</text>
</svg>
