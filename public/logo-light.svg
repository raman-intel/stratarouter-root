<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Icon: 40×40, vertically centered in 48px -->
  <g transform="translate(0, 4)">
    <!-- Glow layer -->
    <rect width="40" height="40" rx="10" fill="url(#iconGrad)" opacity="0.18"/>
    <!-- Icon body -->
    <rect width="40" height="40" rx="10" fill="url(#iconGrad)"/>
    <!-- Lightning bolt -->
    <path
      d="M20 8.5L11.5 20h7.5l-1.25 11.5L26.5 20H19L20 8.5z"
      fill="white"
      stroke="white"
      stroke-width="0.5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Wordmark — x=52, baseline in 48px container -->
  <text
    x="52"
    y="35"
    font-family="'Bricolage Grotesque', 'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="28"
    letter-spacing="-1.1"
  >
    <tspan fill="#0f172a">Strata</tspan><tspan fill="url(#routerGrad)">Router</tspan>
  </text>
</svg>
